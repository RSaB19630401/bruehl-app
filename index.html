  <!-- iPhone PWA-Unterstützung -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Brühl App">

  <!-- Android PWA -->
  <meta name="theme-color" content="#1a365d">
  <link rel="manifest" href="manifest.json">
  
  <!-- Allgemein -->
  <meta name="description" content="Brühl (Baden) Heimat-App – Nachrichten, Veranstaltungen, Vereine, Karte und mehr">
  <title>Brühl (Baden) Heimat-App</title>
  
  <!-- Splash Screens iPhone -->
  <meta name="apple-mobile-web-app-title" content="Brühl">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f7f5f0; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; min-height: 100dvh; }
    /* iOS Safe Area für Notch */
    @supports (padding-top: env(safe-area-inset-top)) {
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    }
    /* Lade-Animation */
    .loader { display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;color:#1a365d; }
    .loader-spin { width:40px;height:40px;border:3px solid #e2ddd4;border-top:3px solid #c69c2e;border-radius:50%;animation:spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <!-- Wird angezeigt während React lädt -->
    <div class="loader">
      <div class="loader-spin"></div>
      <div style="font-size:14px;font-weight:600">Brühl App wird geladen...</div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.0/babel.min.js" crossorigin></script>

  <script>
    // Fehlerbehandlung falls Babel/React nicht laden
    window.onerror = function(msg, url, line) {
      var root = document.getElementById('root');
      if (root && root.querySelector('.loader')) {
        root.innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif;">' +
          '<h2 style="color:#1a365d;">Bruehl App</h2>' +
          '<p style="color:#c53030;margin:16px 0;">Fehler beim Laden: ' + msg + '</p>' +
          '<p>Bitte pruefe deine Internetverbindung und lade die Seite neu.</p>' +
          '<button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#1a365d;color:white;border:none;border-radius:8px;cursor:pointer;">Neu laden</button>' +
          '</div>';
      }
    };
  </script>

  <script type="text/babel" data-presets="react">

// Live-Nachrichten laden via Claude API + Web Search
async function fetchLiveNews() {
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        system: "Du bist ein Nachrichten-Aggregator fuer Bruehl (Baden), PLZ 68782. Suche aktuelle Nachrichten und gib sie als JSON-Array zurueck. ANTWORTE NUR mit einem JSON-Array, ohne Markdown-Backticks oder Erklaerungen.",
        messages: [{
          role: "user",
          content: "Suche die neuesten Nachrichten, Meldungen und Veranstaltungen aus Bruehl (Baden) 68782 bei Mannheim. Durchsuche bruehl-baden.de, Schwetzinger Zeitung, ffw-bruehl.de und lokale Quellen. Gib GENAU ein JSON-Array mit 8-12 Eintraegen zurueck, Format: [{\"id\":1, \"title\":\"...\", \"date\":\"YYYY-MM-DD\", \"source\":\"gemeinde|feuerwehr|schwetzinger|presseportal\", \"category\":\"politik|kultur|umwelt|feuerwehr|sport|wirtschaft|verkehr|bildung\", \"summary\":\"2-3 Saetze...\", \"url\":\"https://...\"}]. Sortiere nach Datum absteigend. NUR reines JSON, keine Erklaerungen!"
        }],
      }),
    });
    const data = await response.json();
    // Text-Bloecke extrahieren
    const text = data.content
      .filter(function(b) { return b.type === "text"; })
      .map(function(b) { return b.text; })
      .join("");
    // JSON parsen
    var cleaned = text.replace(/```json\n?|```/g, "").trim();
    // Falls das JSON in Text eingebettet ist, Array extrahieren
    var match = cleaned.match(/\[[\s\S]*\]/);
    if (match) cleaned = match[0];
    var news = JSON.parse(cleaned);
    if (Array.isArray(news) && news.length > 0) {
      return news.map(function(n, i) { return Object.assign({}, n, { id: i + 1 }); });
    }
  } catch(e) {
    console.log("Live-Daten konnten nicht geladen werden, nutze Fallback:", e);
  }
  return null;
}

    "Was berichtet die Schwetzinger Zeitung über Brühl?",
  ];

  return (
    <div style={{
      background: `linear-gradient(135deg, ${COLORS.bgDark}, #1a2a3a)`,
      borderRadius: 16, padding: 28, color: "#fff",
    }}>
      <h3 style={{ margin: "0 0 4px", fontSize: 18, fontWeight: 700, display: "flex", alignItems: "center", gap: 8 }}>
        🤖 KI-Assistent für Brühl
      </h3>
      <p style={{ margin: "0 0 20px", fontSize: 13, color: "#94a3b8" }}>
        Stelle Fragen zu Brühl – mit Live-Daten aus dem Web
      </p>

      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <input
          value={query}
          onChange={e => setQuery(e.target.value)}
          onKeyDown={e => e.key === "Enter" && askClaude()}
          placeholder="Frage zu Brühl stellen..."
          style={{
            flex: 1, padding: "12px 16px", borderRadius: 12,
            border: "1px solid #334155", background: "#1e293b",
            color: "#fff", fontSize: 14, outline: "none",
          }}
        />
        <button
          onClick={askClaude}
          disabled={loading}
          style={{
            padding: "12px 24px", borderRadius: 12, border: "none",
            background: loading ? "#475569" : COLORS.accent,
            color: "#fff", fontSize: 14, fontWeight: 600, cursor: loading ? "wait" : "pointer",
            transition: "background 0.2s",
          }}
        >
          {loading ? "..." : "Fragen"}
        </button>
      </div>

      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
        {suggestions.map((s, i) => (
          <button key={i} onClick={() => { setQuery(s); }} style={{
            padding: "5px 12px", borderRadius: 16, border: "1px solid #334155",
            background: "transparent", color: "#94a3b8", fontSize: 11,
            cursor: "pointer", transition: "all 0.2s",
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = COLORS.accent; e.currentTarget.style.color = "#fff"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = "#334155"; e.currentTarget.style.color = "#94a3b8"; }}
          >
            {s}
          </button>
        ))}
      </div>

      {loading && <LoadingDots />}
      {error && <p style={{ color: "#fc8181", fontSize: 13 }}>{error}</p>}
      {response && (
        <div style={{
          background: "#1e293b", borderRadius: 12, padding: 16,
          fontSize: 13, lineHeight: 1.7, color: "#e2e8f0",
          borderLeft: `3px solid ${COLORS.accent}`,
          whiteSpace: "pre-wrap",
        }}>
          {response}
        </div>
      )}
    </div>
  );
};

const EventsPanel = ({ filter }) => {
  const today = new Date().toISOString().split("T")[0];
  const upcoming = EVENTS_DATA
    .filter(e => e.date >= today && (filter === "all" || e.category === filter))
    .sort((a, b) => a.date.localeCompare(b.date));
  const past = EVENTS_DATA
    .filter(e => e.date < today && (filter === "all" || e.category === filter))
    .sort((a, b) => b.date.localeCompare(a.date));

  const EventCard = ({ e, isPast }) => (
    <div style={{
      background: COLORS.bgCard, borderRadius: 12, padding: 18,
      border: `1px solid ${COLORS.border}`, opacity: isPast ? 0.6 : 1,
      borderLeft: `4px solid ${isPast ? COLORS.textMuted : COLORS.accent}`,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.accent, marginBottom: 2 }}>
            {new Date(e.date).toLocaleDateString("de-DE", { weekday: "short", day: "2-digit", month: "long", year: "numeric" })} · {e.time} Uhr
          </div>
          <h4 style={{ margin: "0 0 4px", fontSize: 15, fontWeight: 700, color: COLORS.text }}>{e.title}</h4>
        </div>
        <CategoryBadge categoryId={e.category} />
      </div>
      <div style={{ fontSize: 12, color: COLORS.info, marginBottom: 6, fontWeight: 600 }}>📍 {e.location}</div>
      <p style={{ margin: 0, fontSize: 12, lineHeight: 1.6, color: COLORS.textMuted }}>{e.desc}</p>
    </div>
  );

  return (
    <div>
      <h3 style={{ margin: "0 0 4px", fontSize: 17, color: COLORS.primary }}>Kommende Veranstaltungen</h3>
      <p style={{ margin: "0 0 16px", fontSize: 12, color: COLORS.textMuted }}>
        Quelle: <a href="https://www.bruehl-baden.de/veranstaltungen/" target="_blank" rel="noopener noreferrer" style={{ color: COLORS.info }}>Gemeinde Brühl Veranstaltungskalender</a>
      </p>
      <div style={{ display: "grid", gap: 12, marginBottom: 28 }}>
        {upcoming.length === 0 ? <p style={{ color: COLORS.textMuted, fontSize: 13 }}>Keine kommenden Veranstaltungen in dieser Kategorie.</p>
          : upcoming.map((e, i) => <EventCard key={i} e={e} isPast={false} />)}
      </div>
      {past.length > 0 && <>
        <h4 style={{ margin: "0 0 12px", fontSize: 14, color: COLORS.textMuted }}>Vergangene Veranstaltungen</h4>
        <div style={{ display: "grid", gap: 10 }}>
          {past.slice(0, 5).map((e, i) => <EventCard key={i} e={e} isPast={true} />)}
        </div>
      </>}
    </div>
  );
};

const API_BASE = "http://localhost:3001/api";
let API_AVAILABLE = false;

async function fetchAPI(endpoint) {
  if (!API_AVAILABLE) return null;
  try {
    const res = await fetch(`${API_BASE}${endpoint}`, { signal: AbortSignal.timeout(3000) });
    if (res.ok) return res.json();
  } catch(e) { /* Backend nicht erreichbar */ }
  return null;
}

// Beim Start prüfen ob Backend läuft (still, ohne Fehler)
try {
  fetch(`${API_BASE.replace('/api', '/health')}`, { signal: AbortSignal.timeout(2000) })
    .then(r => { if (r.ok) API_AVAILABLE = true; })
    .catch(() => {});
} catch(e) {}

          }}>
            {[
              { id: "aktuell", name: "Aktuell", icon: "📡" },
              { id: "historisch", name: "Historisch", icon: "📜" },
            ].map(v => (
              <button key={v.id} onClick={() => setMainView(v.id)} style={{
                flex: 1, padding: "10px 16px", borderRadius: 10, border: "none",
                cursor: "pointer", fontSize: 14, fontWeight: 700, display: "flex",
                alignItems: "center", justifyContent: "center", gap: 6,
                background: mainView === v.id ? "#fff" : "transparent",
                color: mainView === v.id ? COLORS.primary : "rgba(255,255,255,0.7)",
                transition: "all 0.3s",
              }}>
                {v.icon} {v.name}
              </button>
            ))}
          </div>

          {/* Sub-Navigation */}
          <div style={{ display: "flex", gap: 4, overflowX: "auto" }}>
            {activeSubs.map(s => (
              <button key={s.id} onClick={() => setSubView(s.id)} style={{
                padding: "7px 14px", borderRadius: 8, border: "none",
                cursor: "pointer", fontSize: 12, fontWeight: 600,
                whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 4,
                background: subView === s.id ? "rgba(255,255,255,0.2)" : "transparent",
                color: subView === s.id ? "#fff" : "rgba(255,255,255,0.5)",
                transition: "all 0.2s",
              }}>
                {s.icon} {s.name}
              </button>
            ))}
          </div>
        </div>
      </header>

      {/* CATEGORY FILTER BAR */}
      {(subView === "news" || subView === "timeline" || subView === "vereine" || subView === "events") && (
        <div style={{
          background: COLORS.bgCard, borderBottom: `1px solid ${COLORS.border}`,
          padding: "10px 24px", overflowX: "auto",
          display: "flex", gap: 6, position: "sticky", top: 160, zIndex: 50,
        }}>
          <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", gap: 6, width: "100%" }}>
            {CATEGORIES.map(cat => (
              <button key={cat.id} onClick={() => setCategoryFilter(cat.id)} style={{
                padding: "5px 12px", borderRadius: 16, border: `1px solid ${categoryFilter === cat.id ? COLORS.accent : COLORS.border}`,
                cursor: "pointer", fontSize: 11, fontWeight: categoryFilter === cat.id ? 700 : 500,
                whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 4,
                background: categoryFilter === cat.id ? `${COLORS.accent}15` : "transparent",
                color: categoryFilter === cat.id ? COLORS.accent : COLORS.textMuted,
                transition: "all 0.2s",
              }}>
                {cat.icon} {cat.name}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* SEARCH BAR for news */}
      {subView === "news" && (
        <div style={{ maxWidth: 1200, margin: "0 auto", padding: "16px 24px 0" }}>
          <input
            value={searchTerm}
            onChange={e => setSearchTerm(e.target.value)}
            placeholder="🔍 Nachrichten durchsuchen..."
            style={{
              width: "100%", padding: "12px 16px", borderRadius: 12,
              border: `1px solid ${COLORS.border}`, background: COLORS.bgCard,
              fontSize: 14, outline: "none", boxSizing: "border-box",
              transition: "border-color 0.2s",
            }}
            onFocus={e => e.target.style.borderColor = COLORS.accent}
            onBlur={e => e.target.style.borderColor = COLORS.border}
          />
        </div>
      )}

      {/* MAIN CONTENT */}
      <main style={{ maxWidth: 1200, margin: "0 auto", padding: "20px 24px 60px" }}>
        {mainView === "aktuell" && subView === "news" && (
          <AktuellView filter={categoryFilter} searchTerm={searchTerm} />
        )}
        {mainView === "aktuell" && subView === "events" && <EventsPanel filter={categoryFilter} />}
        {mainView === "aktuell" && subView === "vereine" && (
          <VereinePanel filter={categoryFilter} />
        )}
        {mainView === "aktuell" && subView === "unternehmen" && <UnternehmenPanel />}
        {mainView === "aktuell" && subView === "services" && <ServicesPanel />}
        {mainView === "aktuell" && subView === "map" && <MapPanel />}
        {mainView === "aktuell" && subView === "weather" && <WeatherRheinPanel />}
        {mainView === "aktuell" && subView === "ai" && <AIInsights />}
        {mainView === "aktuell" && subView === "sources" && <SourcesPanel />}
        {mainView === "historisch" && subView === "timeline" && (
          <HistoryTimeline filter={categoryFilter} />
        )}
        {mainView === "historisch" && subView === "geography" && <GeographyPanel />}
        {mainView === "historisch" && subView === "persons" && <PersonalitiesPanel />}
        {mainView === "historisch" && subView === "stolpersteine" && <StolpersteinePanel />}
      </main>

      {/* FOOTER */}
      <footer style={{
        background: COLORS.bgDark, color: "rgba(255,255,255,0.5)",
        padding: "24px", textAlign: "center", fontSize: 11,
      }}>
        <p style={{ margin: "0 0 8px" }}>
          <strong style={{ color: COLORS.accent }}>Brühl (Baden) Heimat-App</strong> · Daten aus {Object.keys(SOURCES).length} Quellen
        </p>
        <p style={{ margin: 0 }}>
          Gemeinde · Brühler Rundschau · Schwetzinger Zeitung · Instagram · Facebook · Feuerwehr · Wikipedia · meinestadt.de · Presseportal · LEO-BW
        </p>
        <p style={{ margin: "8px 0 0", fontSize: 10 }}>
          Powered by Claude AI + MCP · Tägliche Aktualisierung · PWA-fähig
        </p>
      </footer>
    </div>
  );
}

    // App starten
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(BruehlApp));

  </script>

  <!-- Service Worker für Offline -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
