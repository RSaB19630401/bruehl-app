var WORKER_URL = "https://white-recipe-9a06.rsab1963.workers.dev";
var _liveNewsCache = null;
var _liveNewsFetching = false;
var _liveNewsListeners = [];
var _liveDebugInfo = "";

function fetchLiveNews() {
  if (_liveNewsCache) return Promise.resolve(_liveNewsCache);
  if (_liveNewsFetching) return new Promise(function(resolve) { _liveNewsListeners.push(resolve); });
  _liveNewsFetching = true;
  var startTime = Date.now();

  // 30s Timeout via AbortController
  var controller = new AbortController();
  var timeoutId = setTimeout(function() { controller.abort(); }, 30000);

  return fetch(WORKER_URL, { signal: controller.signal })
    .then(function(r) {
      clearTimeout(timeoutId);
      _liveDebugInfo = "HTTP " + r.status + " in " + ((Date.now() - startTime) / 1000).toFixed(1) + "s";
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function(data) {
      console.log("Worker-Response:", JSON.stringify(data).substring(0, 300));
      _liveDebugInfo += " | Keys: " + Object.keys(data).join(",");
      if (data.error) {
        _liveDebugInfo += " | Error: " + data.error;
        _liveNewsFetching = false;
        _liveNewsListeners.forEach(function(fn) { fn(null); }); _liveNewsListeners = [];
        return null;
      }
      if (data.news && Array.isArray(data.news) && data.news.length > 0) {
        var seen = {}; var unique = [];
        for (var i = 0; i < data.news.length; i++) {
          var key = (data.news[i].title || "").toLowerCase().trim();
          if (!seen[key]) { seen[key] = true; data.news[i].id = "live-" + i; unique.push(data.news[i]); }
        }
        _liveDebugInfo += " | " + unique.length + " News";
        _liveNewsCache = { news: unique, sources: data.sources || [], failed: data.failed || [] };
      } else {
        _liveDebugInfo += " | news leer oder fehlt";
      }
      _liveNewsFetching = false;
      _liveNewsListeners.forEach(function(fn) { fn(_liveNewsCache); }); _liveNewsListeners = [];
      return _liveNewsCache;
    })
    .catch(function(e) {
      clearTimeout(timeoutId);
      var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      _liveDebugInfo = "FEHLER nach " + elapsed + "s: " + e.message;
      console.log("Live-Daten nicht verfuegbar:", e.message, "nach", elapsed, "s");
      _liveNewsFetching = false;
      _liveNewsListeners.forEach(function(fn) { fn(null); }); _liveNewsListeners = [];
      return null;
    });
}

const AktuellView = ({ filter, searchTerm }) => {
  const [news, setNews] = useState(FALLBACK_NEWS);
  const [isLive, setIsLive] = useState(false);
  const [loading, setLoading] = useState(true);
  const [liveSources, setLiveSources] = useState([]);
  const fetchedRef = useRef(false);

  useEffect(function() {
    if (fetchedRef.current) return;
    fetchedRef.current = true;
    fetchLiveNews().then(function(result) {
      if (result && result.news && result.news.length > 0) {
        setNews(result.news); setIsLive(true);
        if (result.sources) { setLiveSources(result.sources.map(function(s) { return s.label || s.name; })); }
      }
      setLoading(false);
    });
  }, []);

  var filtered = news.filter(function(n) {
    return (filter === "all" || n.category === filter) && (!searchTerm || n.title.toLowerCase().includes(searchTerm.toLowerCase()) || (n.summary && n.summary.toLowerCase().includes(searchTerm.toLowerCase())));
  });
  filtered.sort(function(a, b) { return new Date(b.date || "2000-01-01").getTime() - new Date(a.date || "2000-01-01").getTime(); });
  var cutoff = Date.now() - (120 * 24 * 60 * 60 * 1000);
  filtered = filtered.filter(function(n) { return new Date(n.date || "2026-01-01").getTime() > cutoff; });

  var statusText = loading ? "Lade Nachrichten von 9 Quellen..." : isLive ? ("Live – " + liveSources.length + " Quellen (" + filtered.length + " Meldungen)") : (filtered.length + " Nachrichten · Fallback-Daten");

  return (
    <div>
      <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 12, padding: "8px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600, background: loading ? "#fffaf0" : isLive ? "#f0fff4" : "#f0f7ff", color: loading ? "#c69c2e" : isLive ? "#2f855a" : "#2b6cb0", border: loading ? "1px solid #feebc8" : isLive ? "1px solid #c6f6d5" : "1px solid #bee3f8" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 14 }}>{loading ? "⏳" : isLive ? "🟢" : "📰"}</span>{statusText}
        </div>
        {!loading && _liveDebugInfo && <div style={{ fontSize: 10, fontWeight: 400, color: "#718096", fontFamily: "monospace" }}>Debug: {_liveDebugInfo}</div>}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))", gap: 16 }}>
        {filtered.length === 0 ? (<div style={{ gridColumn: "1 / -1", textAlign: "center", padding: 40, color: COLORS.textMuted }}>Keine aktuellen Nachrichten in dieser Kategorie.</div>) : filtered.map(function(item, idx) { return React.createElement(NewsCard, { key: item.id || ("x-" + idx), item: item }); })}
      </div>
    </div>
  );
};

          ))}

      </div>)}

      {section === "schulen" && (<div>
        <h3 style={{ margin: "0 0 4px", fontSize: 16, color: COLORS.primary }}>🏫 Schulen in Brühl</h3>

              {s.url && <a href={s.url} target="_blank" rel="noopener noreferrer" style={{ color: COLORS.info, textDecoration: "none", fontWeight: 600 }}>🔗 Website</a>}
            </div>
          </div>))}
        </div>
      </div>)}

      {section === "kitas" && (<div>
        <h3 style={{ margin: "0 0 4px", fontSize: 16, color: COLORS.primary }}>👶 Kindergärten in Brühl</h3>
        <p style={{ margin: "0 0 16px", fontSize: 12, color: COLORS.textMuted }}>Kommunale und kirchliche Einrichtungen</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))", gap: 14 }}>
          {KINDERGARTEN_DATA.map((k, i) => (<div key={i} style={{ background: COLORS.bgCard, borderRadius: 12, padding: 20, border: "1px solid " + COLORS.border }}>

            <span style={{ display: "inline-block", fontSize: 10, padding: "2px 8px", borderRadius: 10, background: "#edf2f7", color: "#4a5568", fontWeight: 600, marginBottom: 8 }}>{k.traeger}</span>

            <div style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 12 }}>
              <span style={{ color: COLORS.text }}>📍 {k.address}</span>
              <a href={"tel:" + k.telefon.replace(/[^0-9+]/g, "")} style={{ color: COLORS.info, textDecoration: "none", fontWeight: 600 }}>📞 {k.telefon}</a>
            </div>
          </div>))}
        </div>
      </div>)}

      {section === "unternehmen" && (<div>
        <h3 style={{ margin: "0 0 4px", fontSize: 16, color: COLORS.primary }}>🏢 Größere Unternehmen</h3>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))", gap: 14 }}>
          {UNTERNEHMEN_DATA.map((u, i) => (<div key={i} style={{ background: COLORS.bgCard, borderRadius: 12, padding: 20, border: "1px solid " + COLORS.border }}>

            <div style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 12 }}>
              <span style={{ color: COLORS.text }}>📍 {u.address}</span>
              {u.telefon && <a href={"tel:" + u.telefon.replace(/[^0-9+]/g, "")} style={{ color: COLORS.info, textDecoration: "none", fontWeight: 600 }}>📞 {u.telefon}</a>}
              {u.url && <a href={u.url} target="_blank" rel="noopener noreferrer" style={{ color: COLORS.info, textDecoration: "none", fontWeight: 600 }}>🔗 Website</a>}
            </div>
          </div>))}
        </div>
      </div>)}
    </div>
  );
};
