<!-- 
  ============================================================
  BRÜHL-APP: ANLEITUNG ZUR AKTUALISIERUNG DER INDEX.HTML
  ============================================================
  
  Du musst in deiner aktuellen index.html ZWEI kleine Stellen ändern.
  Öffne die index.html auf GitHub im Editor (Stift-Symbol).
  
  ============================================================
  ÄNDERUNG 1: Source-Labels erweitern
  ============================================================
  
  Suche mit Strg+F nach:  sourceLabel
  ODER nach:               feuerwehr.*Feuerwehr
  ODER nach:               source ===
  
  Du findest eine Stelle, wo die Quellen-Namen gemappt werden.
  Das könnte so aussehen:
  
    var sourceLabels = { google_news: "Google News", feuerwehr: "Feuerwehr", ...
  
  ODER als ternäre Kette:
    source === "feuerwehr" ? "Feuerwehr" : source === "gemeinde" ? "Gemeinde" : ...
  
  ERSETZE diese ganze Zeile/Block durch:

  var sourceLabels = {
    google_news: "Google News",
    google_news_2: "Google News",
    feuerwehr: "Feuerwehr Brühl",
    tv_bruehl: "TV Brühl 1912",
    fv_bruehl: "FV 1918 Brühl",
    presseportal: "Presseportal",
    schwetzinger: "Schwetzinger Ztg.",
    gemeinde: "Gemeinde Brühl",
    nussbaum: "Nussbaum Medien",
  };

  Falls es eine ternäre Kette ist (source === ... ? ... :), ersetze sie durch:
    (sourceLabels[item.source] || item.source)


  ============================================================
  ÄNDERUNG 2: Source-Farben erweitern (optional aber empfohlen)
  ============================================================
  
  Suche mit Strg+F nach:  sourceColor
  ODER nach:               feuerwehr.*#
  ODER nach:               color.*source
  
  Du findest eine Stelle wo Quellen-Farben definiert sind.
  Ergänze die neuen Quellen:

  var sourceColors = {
    google_news: "#4285f4",
    google_news_2: "#4285f4",
    feuerwehr: "#e53e3e",
    tv_bruehl: "#2b6cb0",
    fv_bruehl: "#276749",
    presseportal: "#805ad5",
    schwetzinger: "#d69e2e",
    gemeinde: "#2c5282",
    nussbaum: "#718096",
  };

  Falls es eine ternäre Kette ist, ersetze sie durch:
    (sourceColors[item.source] || "#718096")
